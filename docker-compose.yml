services: 
  nginx:
   build:
     context: ./nginx
   container_name: "nginx_cont"
   ports:
     - "80:80"
   networks: 
     - notes-app
   volumes:
     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf    
   restart: always
   depends_on: 
     - django

  mysql:
   image: mysql
   container_name: "mysql"
   ports: 
     - "3306:3306"
   env_file:
     - .env
   volumes:
     - mysql-data:/var/lib/mysql
   networks:
     - notes-app
   restart: always 
   healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  django:
     build:
       context: ./
     container_name: "django_cont"
     ports:
       - "8000:8000"
     command: sh -c "python manage.py migrate --noinput && gunicorn notesapp.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
     networks:
       - notes-app
     env_file:
       - .env
     restart: always
     healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
     depends_on: 
       - mysql

volumes:
   mysql-data:
networks:
   notes-app:
