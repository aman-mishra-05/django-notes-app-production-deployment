services:
  nginx:
    build: 
     context: ./nginx
    container_name: "nginx_cont"
    ports:
      - "80:80"
    networks:
      - notes-app
    restart: always
    mem_limit: 64m
    memswap_limit: 64m
    depends_on:
      django:
        condition: service_healthy

  mysql:
    image: mysql
    container_name: "mysql"
    ports:
      - "3306:3306"
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - notes-app
    restart: always
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      MYSQL_INNODB_BUFFER_POOL_SIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  django:
    build:
      context: ./
    container_name: "django_cont"
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn notesapp.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    networks:
      - notes-app
    env_file:
      - .env
    restart: always
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/admin')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:

networks:
  notes-app:
